name: External Brain Think

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  think:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y jq sqlite3

      - name: Run synthesis
        env:
          DATA_DIR: ${{ github.workspace }}/.brain-data
          KNOWLEDGE_DIR: ${{ github.workspace }}/knowledge
          BRAIN_CONFIG_PATH: ${{ github.workspace }}/brain-config.json
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          WALLET_BALANCE: ${{ vars.WALLET_BALANCE || '0' }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          mkdir -p "$DATA_DIR" "$KNOWLEDGE_DIR"
          bash scripts/think.sh

      - name: Commit synthesis
        run: |
          if [ -z "$(git status --porcelain knowledge)" ]; then
            echo "No knowledge changes to commit"
            exit 0
          fi
          git config user.name "ai-genesis-bot"
          git config user.email "ai-genesis-bot@users.noreply.github.com"
          git add knowledge
          git commit -m "chore: add autonomous synthesis"
          git push
